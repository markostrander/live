<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split the Lark</title>

<link rel="icon" href="media/favicon.ico">

<style>
body {
  margin: 0;
  background: black;
  color: #f5f5f5;
  font-family: Georgia, serif;
}

/* MAIN LAYOUT */
.wrapper {
  display: flex;
  min-height: 100vh;
}

/* LEFT IMAGE */
.left {
  flex: 1;
  background: url('media/banner.png') center/cover no-repeat;

  image-rendering: auto;
  filter: contrast(1.05) brightness(1.02);
}

/* CENTER BAND */
.center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* HORIZONTAL STRIP */
.band {
  width: 100%;
  background: black;
  padding: 20px;
  text-align: center;
  border-top: 1px solid #333;
  border-bottom: 1px solid #333;
}

/* LOGO */
.logo {
  max-width: 300px;
}

/* CREDIT */
.credit {
  margin-top: 10px;
  font-size: 0.8rem;
  opacity: 0.7;
  color: #cbb26a;
}

/* RIGHT FORM */
.right {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

/* FORM STYLING */
form {
  width: 100%;
  max-width: 300px;
}

label {
  display: block;
  margin-top: 15px;
  font-size: 0.85rem;
}

input, textarea {
  width: 100%;
  padding: 8px;
  background: #111;
  border: 1px solid #555;
  color: #fff;
  margin-top: 5px;
}

button {
  margin-top: 20px;
  padding: 10px;
  background: #222;
  border: 1px solid #888;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #444;
}

/* MOBILE STACK */
@media (max-width: 900px) {
  .wrapper {
    flex-direction: column;
  }

  .left {
    height: 40vh;
  }

  .right {
    padding: 20px;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- LEFT IMAGE -->
  <div class="left"></div>

  <!-- CENTER BAND -->
  <div class="center">
    <div class="band">
      <img src="media/ribbon.png" class="logo" alt="Split the Lark">

      <div class="credit">
        Words by Emily Dickinson (1830–1886)
      </div>
    </div>
  </div>

  <!-- RIGHT FORM -->
  <div class="right">
    <form action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="3abbc732-c74e-4514-b713-f8e2736713fd">

      <label>Name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Message</label>
      <textarea name="message" rows="5" required></textarea>

      <button type="submit">Send</button>
    </form>
  </div>

</div>

</body>
</html>
