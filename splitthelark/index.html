<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split the Lark</title>
  <link rel="icon" href="media/favicon.ico" />

  <style>
    :root {
      --gold: #b8a24a;
      --soft-gold: #d8ca7a;
      --black: #020202;
      --field: #171211;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--black);
      color: #f2e9c9;
      font-family: Georgia, "Times New Roman", serif;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 2fr 1.1fr;
    }

    .art-panel {
      position: relative;
      min-height: 100vh;
      background: var(--black);
      overflow: hidden;
    }

    .art-top,
    .art-bottom {
      position: absolute;
      left: 0;
      width: 58%;
      height: 48%;
      background-image: url("media/banner.png");
      background-size: cover;
      background-repeat: no-repeat;
      filter: contrast(1.04) saturate(0.95);
    }

    .art-top {
      top: 0;
      background-position: left top;
    }

    .art-bottom {
      bottom: 0;
      background-position: left bottom;
    }

    .center-band {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      transform: translateY(-50%);
      min-height: 190px;
      background: var(--black);
      border-top: 1px solid var(--gold);
      border-bottom: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .credit-ribbon {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      background: #8b7a2e;
      color: #efe7a5;
      padding: 14px 48px 14px 34px;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      clip-path: polygon(0 0, 92% 0, 100% 50%, 92% 100%, 0 100%);
      z-index: 2;
    }

    .logo-wrap {
      text-align: center;
      z-index: 1;
    }

    .logo {
      width: min(520px, 55vw);
      max-width: 100%;
      height: auto;
      filter: drop-shadow(0 0 10px rgba(200, 180, 90, 0.2));
    }

    .location {
      margin-top: -8px;
      color: var(--soft-gold);
      font-size: 1.35rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .contact-panel {
      min-height: 100vh;
      background: radial-gradient(circle at center, #090807 0%, #000 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 7vw;
    }

    .contact {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .ornament {
      color: var(--gold);
      opacity: 0.75;
      margin-bottom: 18px;
      letter-spacing: 0.25em;
    }

    h1 {
      color: var(--soft-gold);
      font-size: 1.1rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin: 0 0 22px;
      font-weight: normal;
    }

    .intro {
      font-style: italic;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 42px;
      color: #eee2c4;
    }

    form {
      text-align: left;
    }

    label {
      display: block;
      color: var(--soft-gold);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.8rem;
      margin: 22px 0 8px;
    }

    input,
    textarea {
      width: 100%;
      background: rgba(35, 25, 22, 0.55);
      border: 1px solid rgba(216, 202, 122, 0.35);
      color: #fff8dc;
      padding: 13px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1rem;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      display: block;
      margin: 36px auto 0;
      padding: 14px 34px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--soft-gold);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-family: Georgia, "Times New Roman", serif;
      cursor: pointer;
    }

    button:hover {
      background: rgba(184, 162, 74, 0.12);
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .art-panel {
        min-height: 70vh;
      }

      .art-top,
      .art-bottom {
        width: 100%;
      }

      .center-band {
        min-height: 170px;
      }

      .credit-ribbon {
        top: auto;
        bottom: 18px;
        transform: none;
        font-size: 0.8rem;
        padding-left: 20px;
      }

      .logo {
        width: 75vw;
      }

      .contact-panel {
        min-height: auto;
        padding: 50px 24px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="art-panel" aria-label="Split the Lark artwork">
      <div class="art-top"></div>
      <div class="art-bottom"></div>

      <div class="center-band">
        <div class="credit-ribbon">
          words by EMILY DICKINSON (1830–1886)
        </div>

        <div class="logo-wrap">
          <img class="logo" src="media/ribbon.png" alt="Split the Lark" />
          <div class="location">Massachusetts</div>
        </div>
      </div>
    </section>

    <section class="contact-panel">
      <div class="contact">
        <div class="ornament">— ❧ —</div>
        <h1>Stay in Touch</h1>

        <p class="intro">
          Be the first to hear about new releases, performances, and more.
        </p>

        <form action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="3abbc732-c74e-4514-b713-f8e2736713fd">

          <label for="name">Name</label>
          <input id="name" type="text" name="name" required>

          <label for="email">Email</label>
          <input id="email" type="email" name="email" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
