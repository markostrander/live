<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Split the Lark</title>

  <link rel="icon" href="media/favicon.ico" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<main class="page">

  <!-- LEFT ART PANEL -->
  <section class="art-panel">

    <div class="artwork"></div>

    <div class="center-band">

      <div class="credit-ribbon">
        words by EMILY DICKINSON (1830–1886)
      </div>

      <div class="logo-wrap">

      <img class="logo-image" src="media/logo.png" alt="Split the Lark">

        <div class="location">
          Massachusetts
        </div>

      </div>

    </div>

  </section>

  <!-- RIGHT CONTACT PANEL -->
  <section class="contact-panel">

    <div class="contact">

      <div class="ornament">
        ❧
      </div>

      <h1>Stay in Touch</h1>

      <p class="intro">
        “A Letter always feels to me like immortality…”<br>
        — Emily Dickinson
      </p>

      <form action="https://api.web3forms.com/submit" method="POST">

        <input
          type="hidden"
          name="access_key"
          value="3abbc732-c74e-4514-b713-f8e2736713fd"
        >

        <label for="name">Name</label>

        <input
          id="name"
          type="text"
          name="name"
          required
        >

        <label for="email">Email</label>

        <input
          id="email"
          type="email"
          name="email"
          required
        >

        <label for="message">Message</label>

        <textarea
          id="message"
          name="message"
          required
        ></textarea>

        <button type="submit">
          Send Message
        </button>

      </form>

    </div>

  </section>

</main>

</body>
</html>
