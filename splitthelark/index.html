<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Split the Lark</title>

  <link rel="icon" href="media/favicon.ico" />
  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">  
  
</head>

<body>

<main class="page">

  <!-- LEFT ART PANEL -->
  <section class="art-panel">

    <div class="artwork"></div>

    <div class="center-band">

    <div class="credit-ribbon">
      Words by EMILY DICKINSON
      <span class="dates">(1830–1886)</span>
    </div>

      <div class="logo-wrap">
        <img class="logo-image" src="media/Logo.png" alt="Split the Lark">

        <div class="location">
          Massachusetts
        </div>
      </div>

      <div class="music-ribbon">
        Music by SPLIT THE LARK
      </div>

    </div>

  </section>

  <!-- RIGHT CONTACT PANEL -->
  <section class="contact-panel">

    <iframe
  width="100%"
  height="166"
  scrolling="no"
  frameborder="no"
  allow="autoplay"
  src="https://soundcloud.com/split-the-lark/howtoforget?utm_source=clipboard&utm_campaign=wtshare&utm_medium=widget&utm_content=https%253A%252F%252Fsoundcloud.com%252Fsplit-the-lark%252Fhowtoforget">
</iframe>

    
    <div class="contact">

      <div class="ornament">
        ❦
      </div>

      <h1>Correspondence</h1>

      <p class="intro">
        “A Letter always feels to me like immortality…”<br>
        — Emily Dickinson
      </p>

  
      <form action="https://api.web3forms.com/submit" method="POST">

        <input
          type="hidden"
          name="access_key"
          value="3abbc732-c74e-4514-b713-f8e2736713fd"
        >

        <input
          type="hidden"
          name="redirect"
          value="https://live-git-2026-dev-markostranders-projects.vercel.app/thanks/"
        >

        <label for="name">Name</label>
        <input
          id="name"
          type="text"
          name="name"
          required
        >

        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          required
        >

        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          required
        ></textarea>

        <button type="submit">
          Send Message
        </button>

      </form>

    </div>

  </section>

</main>

</body>
</html>
